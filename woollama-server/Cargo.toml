[package]
name = "woollama-server"
version = "0.4.0"
edition = "2021"
description = "The woollama router service (Rust). Stub — grows from slice 2 (see docs/rust-router-port.md)."
license = "MIT"

[[bin]]
name = "woollama-server"
path = "src/main.rs"

[dependencies]
# The pure-Rust engine — proves it links into a non-PyO3 binary (slice 1's point).
# Slice 2 adds axum/tokio and the HTTP surface on top of it.
woollama-engine = { path = "../woollama-engine" }
