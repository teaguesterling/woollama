[package]
name = "woollama-server"
version = "0.4.0"
edition = "2021"
description = "The woollama router service (Rust) — axum HTTP surface over woollama-engine."
license = "MIT"

[lib]
name = "woollama_server"
path = "src/lib.rs"

[[bin]]
name = "woollama-server"
path = "src/main.rs"

[dependencies]
woollama-engine = { path = "../woollama-engine" }
axum = "0.8"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
