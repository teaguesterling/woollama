name: Wheels (woollama-core)

# Cross-platform native wheels for `woollama-core` (the PyO3/maturin extension that provides
# `woollama.core`), built with PyO3/maturin-action. Per-CPython-version wheels — abi3 is NOT
# usable here because `InferenceError` subclasses `PyException`, which the stable ABI can't do.
# Builds run on push/PR (catch breakage); the publish job runs only on a vX.Y.Z tag.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  # Linux glibc (manylinux) — the container ships every CPython, so one job per arch builds
  # all interpreters at once via `-i`. aarch64 cross-compiles in the container (no QEMU).
  linux:
    runs-on: ubuntu-latest
    # aarch64-glibc cross-builds are flaky in the manylinux containers; keep that leg
    # best-effort so it never blocks publishing the other wheels (aarch64 users still get
    # the musllinux wheel + the sdist). x86_64 stays required.
    continue-on-error: ${{ matrix.target == 'aarch64' }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: woollama-core
          target: ${{ matrix.target }}
          manylinux: "2014"
          args: --release --out dist -i 3.11 3.12 3.13
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: woollama-core/dist

  # Linux musl (Alpine).
  musllinux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build musllinux wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: woollama-core
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --release --out dist -i 3.11 3.12 3.13
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: woollama-core/dist

  # macOS — no build container, so matrix over (arch, python). x86_64 on macos-13, arm64 on
  # macos-14. setup-python provides each interpreter; maturin builds against it.
  macos:
    runs-on: ${{ matrix.target == 'x86_64' && 'macos-13' || 'macos-14' }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: woollama-core
          target: ${{ matrix.target }}
          args: --release --out dist -i python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: woollama-core/dist

  # Windows x64 — matrix over python.
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Build Windows wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: woollama-core
          target: x64
          args: --release --out dist -i python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: woollama-core/dist

  # Source distribution — installable anywhere with a Rust toolchain; its woollama-engine path
  # dep falls back to the crates.io-published engine when the workspace isn't present.
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: woollama-core
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: woollama-core/dist

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ Publishes woollama-core to PyPI on a vX.Y.Z tag via Trusted Publishing    │
  # │ (OIDC — no token). ONE-TIME SETUP before the first tagged publish works:  │
  # │   1. PyPI → the `woollama-core` project → Publishing → add a GitHub       │
  # │      Actions trusted publisher: owner `teaguesterling`, repo `woollama`,  │
  # │      workflow `wheels.yml`, environment `pypi`.                           │
  # │   2. GitHub → repo Settings → Environments → `pypi` (already created for  │
  # │      the woollama publish in ci.yml).                                      │
  # │ Until the publisher exists this job fails harmlessly — publish manually   │
  # │ with `maturin upload` / `twine upload`.                                   │
  # └─────────────────────────────────────────────────────────────────────────┘
  publish:
    name: Publish woollama-core to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, musllinux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
