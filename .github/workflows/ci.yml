name: CI

# The gate that ruff was missing. `ruff check` is configured in pyproject but
# nothing enforced it, so it drifted once (cleaned in 7da4b52). This runs it —
# plus the hermetic test suite — on every push to main and every PR.

on:
  push:
    branches: [main]
    tags: ["v*"]          # a vX.Y.Z tag runs the gate, then publishes (below)
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync (dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      # The lint gate. Lint only — the project deliberately does NOT use
      # ruff-format (E501 is ignored; lines are hand-wrapped), so `ruff format
      # --check` is intentionally not run.
      - name: Ruff lint
        run: uv run --extra dev ruff check .

      # Hermetic tests only: pyproject's addopts already excludes the
      # `integration` marker, so CI needs no Ollama / Claude / API keys.
      - name: Hermetic tests
        run: uv run --extra dev pytest

  # The Rust gate for `woollamad` (the canonical router). The dev box has no rustup
  # (distro rust, no clippy/rustfmt), so build+test are the locally-verified gates;
  # clippy runs here where the component exists. `cargo fmt --check` is intentionally
  # NOT run — the project hand-formats (same stance as not running `ruff format`).
  rust:
    name: Rust (woollamad)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Hermetic Rust suites need the test-fixture bins (mcp_fixture/fake_claude),
      # gated behind the `test-fixtures` feature so `cargo install` doesn't ship them.
      # Scope with -p: the workspace-root `woollama` placeholder has neither the feature
      # nor the bin, so a bare `--features`/`--bin` from root errors.
      - name: Test (with fixtures)
        run: cargo test --tests -p woollama-server -p woollama-engine --features test-fixtures
      - name: Clippy (lint gate)
        run: cargo clippy -p woollama-server -p woollama-engine --all-targets --features test-fixtures -- -D warnings
      - name: Release build (the woollamad binary)
        run: cargo build --release -p woollama-server --bin woollamad

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ Publishes to PyPI on a `vX.Y.Z` tag, AFTER the gate passes, via PyPI      │
  # │ Trusted Publishing (OIDC — no token in the repo). ONE-TIME SETUP before   │
  # │ the first tagged publish works:                                           │
  # │   1. PyPI → the `woollama` project → Publishing → add a GitHub Actions    │
  # │      trusted publisher: owner `teaguesterling`, repo `woollama`,          │
  # │      workflow `ci.yml`, environment `pypi`.                               │
  # │   2. GitHub → repo Settings → Environments → create `pypi`.               │
  # │ Until both exist, this job fails (harmlessly) — publish that release      │
  # │ manually with `uv publish`.                                               │
  # └─────────────────────────────────────────────────────────────────────────┘
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC: mint the short-lived PyPI token
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ Publishes the Rust crates to crates.io on a `vX.Y.Z` tag, after the Rust  │
  # │ gate passes. Order is woollama-engine → woollama-server (the server's     │
  # │ versioned path dep resolves only once the engine is on the index).        │
  # │ ONE-TIME SETUP: add a `CRATES_IO_TOKEN` repo secret (a crates.io API      │
  # │ token with publish-new + publish-update scope). Until it exists this job  │
  # │ fails harmlessly — publish manually with `cargo publish -p woollama-engine`│
  # │ then `cargo publish -p woollama-server`.                                   │
  # └─────────────────────────────────────────────────────────────────────────┘
  publish-crates:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint-and-test, rust]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Idempotent: skip a crate whose exact version is already on crates.io (these are also
      # sometimes published manually out-of-band). The existence check is an unauthenticated
      # crates.io API call, so a skip needs no token — the tag stays green either way. Engine
      # first; `cargo publish` waits for the new version to be downloadable before returning,
      # so the server publish that follows can resolve it.
      - name: Publish crates (skip already-published)
        run: |
          publish_if_new() {
            crate="$1"
            ver=$(grep -m1 '^version' "$crate/Cargo.toml" | sed 's/.*"\(.*\)".*/\1/')
            if curl -sf -o /dev/null "https://crates.io/api/v1/crates/$crate/$ver"; then
              echo "$crate $ver already on crates.io — skipping"
            else
              cargo publish -p "$crate"
            fi
          }
          publish_if_new woollama-engine
          publish_if_new woollama-server
